<svg viewBox="0 0 200 100" width="200" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Pac-Man -->
  <circle cx="30" cy="50" r="15" fill="yellow">
    <animate attributeName="cx" from="30" to="170" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Boca do Pac-Man -->
  <polygon points="30,50 45,40 45,60" fill="black">
    <animate attributeName="points" values="30,50 45,40 45,60; 30,50 30,50 30,50" dur="0.2s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Fantasma -->
  <g>
    <circle cx="170" cy="50" r="13" fill="red">
      <animate attributeName="cx" from="170" to="30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Olhos -->
    <circle cx="165" cy="45" r="3" fill="white"/>
    <circle cx="175" cy="45" r="3" fill="white"/>
    <!-- Pupilas seguindo Pac-Man -->
    <circle cx="166" cy="45" r="1.5" fill="black">
      <animate attributeName="cx" from="166" to="160" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="176" cy="45" r="1.5" fill="black">
      <animate attributeName="cx" from="176" to="170" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
